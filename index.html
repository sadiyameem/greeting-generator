<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="qidth=device-width, initial-scale=1.0">
        <title>Greeting Generator</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <div id="container" class="container">
            <label for="name">Enter Name: </label>
            <input maxlength="12" type="text" id="name" class="name" placeholder="Enter The Name">
            <label for="theme">Select Theme: </label>
            <select name="Theme" id="theme">
                <option vale="Birthday">Birthday</option>
                <option value="Wedding">Wedding Day</option>
                <option value="Friendship">Friendship Day</option>
                <option vale="Valentines">Valentines's Day</option>
                <option value ="Anniversary">Anniversary</option>
                <option value="Graduation">Graduation Day</option>
                <option value="Mother">Mother's Day</option>
                <option value="Father">Father's Day</option>
            </select>
            <button id="generate">Generate Card</button>
            <div id="card" class="card">
                <h3 id="card-title"></h3>
                <p id="card-greeting"></p>
            </div>
            <button class="download" id="download">Download Card</button>
        </div>
        <script src="script.js"></script>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    </body>
</html>
