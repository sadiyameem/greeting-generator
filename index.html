<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Greeting Generator</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body onload="initialClock()">
        <div class="datetime">
            <div class="date">
                <span id="dayname">Day</span>
                <span id="month">month</span>
                <span id="day">00</span>
                <span id="year">Year</span>
            </div>
            <div class="time">
                <span id="hour">00</span>
                <span id="minutes">00</span>
                <span id="seconds">00</span>
                <span id="period">AM</span>
            </div>
        </div>

        <div id="container" class="container">
            <label for="name">Enter Name: </label>
            <input maxlength="12" type="text" id="name" class="name" placeholder="Enter The Name">
            <label for="theme">Select Theme: </label>
            <select name="Theme" id="theme">
                <option value="Birthday">Birthday</option>
                <option value="Wedding">Wedding Day</option>
                <option value="Christmas">Christmas</option>
                <option value="Valentines">Valentines's Day</option>
                <option value ="Anniversary">Anniversary</option>
                <option value="Graduation">Graduation Day</option>
                <option value="Mother">Mother's Day</option>
                <option value="Father">Father's Day</option>
            </select>
            <button id="generate">Generate Card</button>
            <div id="card" class="card">
                <h3 id="card-title"></h3>
                <p id="card-greeting"></p>
            </div>
            <button class="download" id="download">Download Card</button>
        </div>
        <script src="script.js"></script>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

        <script>

function updateClock() {
    var now = new Date();
    var dname = now.getDay(),
        mos = now.getMonth(),
        dnum = now.getDate(),
        yr = now.getFullYear(),
        hr = now.getHours(),
        min = now.getMinutes(),
        sec = now.getSeconds(),
        per = "AM";

        if(hr == 0) {
            hr = 12;
        }
        if (hr > 12) {
            hr = hr - 12;
            per = "PM";
        }

        Number.prototype.pad = function(digits) {
            for(var n = this.toString(); n.length < digits; n = 0 + n);
            return n;
        }

        var months = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"];
        var week = ["Sunday", "Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday"];
        var ids = ["dayname", "month", "day", "year", "hour", "minutes", "seconds", "period"];
        var values = [week[dname], months[mos], dnum.pad(2), yr.pad(2), hr.pad(2), min.pad(2), sec.pad(2), per];
        for (var i = 0; i < ids.length; i++) {
            document.getElementById(ids[i]).firstChild.nodeValue = values[i];
        }
}


function initialClock() {
    updateClock();
    window.setInterval("updateClock()", 1000);
}
        </script>
    </body>
</html>
